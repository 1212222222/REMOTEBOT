name: REMOTEBOT
on:
  workflow_dispatch: {}
  schedule:
    - cron: '*/30 * * * *'
jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      
      # 1. Canvas'ın derlenmesi için gerekli TÜM sistem kütüphaneleri
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev pkg-config
      
      # 2. Temiz kurulum
      - name: Install npm packages
        run: |
          rm -rf node_modules package-lock.json
          npm install
          
      # 3. Canvas'ı zorla tekrar kur ve test et
      - name: Force Canvas Install
        run: |
          npm install canvas --build-from-source
          if [ -d "node_modules/canvas" ]; then echo "Canvas bulundu, her şey yolunda!"; else echo "Canvas YÜKLENEMEDİ!"; exit 1; fi
      
      # 4. Botu çalıştır
      - run: node bot.js
