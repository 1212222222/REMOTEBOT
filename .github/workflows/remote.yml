name: REMOTEBOT
on:
  workflow_dispatch: {}
  schedule:
    - cron: '*/30 * * * *'
jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      
      # 1. Sistem bağımlılıklarını kur
      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
      
      # 2. Önce eski dosyaları temizle ve düzgün kurulum yap
      - run: rm -rf node_modules package-lock.json
      - run: npm install
      
      # 3. Canvas'ı zorunlu olarak derle ve kur
      - run: npm install canvas --build-from-source
      
      # 4. Botu çalıştır
      - run: node bot.js
