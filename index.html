<iframe id="gameFrame" style="width:100%; height:80vh; border:none;"></iframe>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

    // Linki buraya yapıştır
    document.getElementById('gameFrame').src = "https://BURAYA_LOCALTUNNEL_LINKINI_YAZ";

    const db = getDatabase(initializeApp({ /* Firebase Ayarların */ }));
    let keys = { w: false, a: false, s: false, d: false, space: false, shift: false, ctrl: false };

    window.addEventListener('keydown', (e) => { 
        if(keys.hasOwnProperty(e.key.toLowerCase())) { keys[e.key.toLowerCase()] = true; update(); } 
    });
    window.addEventListener('keyup', (e) => { 
        if(keys.hasOwnProperty(e.key.toLowerCase())) { keys[e.key.toLowerCase()] = false; update(); } 
    });
    
    window.addEventListener('mousemove', (e) => {
        set(ref(db, 'controller/look'), { yaw: -e.clientX/500, pitch: (e.clientY-300)/500 });
    });

    function update() { set(ref(db, 'controller/keys'), keys); }
</script>
